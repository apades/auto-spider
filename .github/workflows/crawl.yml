name: 海南空气质量数据抓取

on:
  schedule:
    # 每 25 分钟运行一次
    - cron: '*/25 * * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许 workflow 推送提交
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 运行爬虫
        env:
          PROXY_HOST: ${{ vars.PROXY_HOST }}
          PROXY_USERNAME: ${{ vars.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ vars.PROXY_PASSWORD }}
        run: node scripts/run.js

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "无新数据"
          else
            git commit -m "chore: 更新空气质量数据 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
